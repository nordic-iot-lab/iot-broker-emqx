# EMQX 6.0 — multi-tenant IoT broker with project isolation
#
# Override any setting via environment variables in docker-compose.yml:
#   EMQX_LISTENERS__TCP__DEFAULT__BIND=0.0.0.0:1883
#   EMQX_CONNECTORS__PGSQL__POSTGRES_MQTT__SERVER=my-pg:5432

# ── Listeners ──────────────────────────────────────────────
listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}
listeners.ws.default {
  bind = "0.0.0.0:8083"
  max_connections = 1024000
}
listeners.wss.default {
  bind = "0.0.0.0:8084"
  max_connections = 1024000
}

# ── Authentication ─────────────────────────────────────────
authentication = [
  {
    backend = built_in_database
    enable = true
    mechanism = password_based
    password_hash_algorithm {name = sha256, salt_position = suffix}
    user_id_type = username
  }
]

# ── Authorization (file-based ACL) ─────────────────────────
authorization {
  no_match = deny
  deny_action = ignore
  cache { enable = true, max_size = 32, ttl = "1m" }
  sources = [
    { enable = true, type = file, path = "data/authz/acl.conf" }
  ]
}

# ── PostgreSQL connector ───────────────────────────────────
connectors.pgsql.postgres_mqtt {
  enable = true
  server = "postgres:5432"
  database = mqtt
  username = mqtt
  password = mqttpass
  pool_size = 8
  ssl { enable = false }
}

# ── Persist action ─────────────────────────────────────────
actions.pgsql.insert_mqtt_message {
  enable = true
  connector = postgres_mqtt
  parameters {
    sql = "INSERT INTO mqtt_messages(topic, payload, qos, retain, client_id, username, timestamp) VALUES(${topic}, ${payload}, ${qos}, ${flags.retain}, ${clientid}, ${username}, NOW())"
  }
}

# ── Rule: persist all messages ─────────────────────────────
rule_engine {
  ignore_sys_message = true
  rules {
    persist_all_mqtt_messages {
      enable = true
      description = "Persist all MQTT messages to PostgreSQL"
      sql = "SELECT * FROM \"#\""
      actions = ["pgsql:insert_mqtt_message"]
    }
  }
}

# ── Dashboard ──────────────────────────────────────────────
dashboard {
  default_username = "admin"
  default_password = "admin1234"
}
