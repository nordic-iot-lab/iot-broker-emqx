%% ACL — project isolation
%% sensor+nrf project: devices/bridges publish telemetry only
%% nrf can publish industrial/# for the industrial status-tag firmware profile.
%% dashboard user subscribes to telemetry only
%% vessel project: vessel (completely isolated)
{allow,{username,"coap-server"},publish,["sensor/#"]}.
{allow,{username,"nrf"},publish,["sensor/#","industrial/#"]}.
{allow,{username,"sensor-device"},publish,["sensor/#"]}.
{allow,{username,"dashboard"},subscribe,["sensor/#","industrial/#"]}.
{allow,{username,"vessel"},publish,["vessel/#"]}.
{allow,{ipaddr,"127.0.0.1"},all,["$SYS/#","#"]}.
{deny,all,subscribe,["$SYS/#",{eq,"#"},{eq,"+/#"}]}.
{deny,all}.
